<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Prettifier Web UI</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #dfdfdf;
        }
        input {
            background-color: #f6f6f6;
        }
        textarea {
            background-color: #f6f6f6;
        }
        pre {
            background-color: #f6f6f6;
        }
    </style>
</head>
<body>
    <h1>JSON Prettifier Web UI</h1>
    <h2>Enter JSON text or a URL that returns JSON to make pretty</h2>
{{ if .Success }}
    <form id="urlInput" action="url" method="POST">
        <label>URL:</label><br />
        <input type="url" id="urlInput" name="urlInput" size="80" value="{{ .URL }}" required><br /><br />
        <button type="submit">Submit URL</button>
    </form><br />
    <form id="textInput" action="text" method="POST">
        <label for="textInput">Enter JSON text:</label><br />
        <textarea id="textInput" name="textInput" rows="10" cols="72" value="{{ .TEXT }}" required></textarea><br /><br />
        <button type="submit">Submit Text</button>
    </form><br />
    <h2>Here's the response from the previous request:</h2>
    <p>Request URL: <strong><a href={{ .URL }}>{{ .URL }}</a></strong></p>
    <p>Response:</p>
    <pre>
{{ .Response }}
    </pre>
{{ else }}
    <form id="urlInput" action="url" method="POST">
        <label>URL:</label><br />
        <input type="url" id="urlInput" name="urlInput" size="80" required><br /><br />
        <button type="submit">Submit URL</button>
    </form><br />
    <form id="textInput" action="text" method="POST">
        <label for="textInput">JSON text:</label><br />
        <textarea id="textInput" name="textInput" rows="10" cols="72" required></textarea><br /><br />
        <button type="submit">Submit Text</button>
    </form><br />
{{ end }}
</body>
</html>
